{% extends "base.html" %}
{% block title %}Console - Trading Bot{% endblock %}

{% block content %}
<div class="container">
    <h2>Real-time Console Log</h2>
    <hr>
    <div id="log-output" style="height: 400px; overflow-y: scroll; border: 1px solid #ccc; background-color: #f5f5f5; padding: 10px; white-space: pre-wrap;">
        <p>Connecting to log stream...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- Make sure Socket.IO client library is loaded if not already in base.html -->
<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script> -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const logOutput = document.getElementById('log-output');

    // Check if Socket.IO is loaded
    if (typeof io === 'undefined') {
        logOutput.innerHTML = '<p>Error: Socket.IO client library not loaded. Real-time logs unavailable.</p>';
        console.error("Socket.IO client not found. Ensure it's included in base.html or this page.");
        return;
    }

    const socket = io(location.protocol + '//' + document.domain + ':' + location.port);

    socket.on('connect', function() {
        logOutput.innerHTML = '<p><em>Connected to log stream. Waiting for messages...</em></p>';
        console.log('Socket.IO connected for logs.');
    });

    socket.on('log_message', function(msg) {
        const p = document.createElement('p');
        // Assuming msg.data is the log string. Adjust if structure is different.
        // e.g., if msg is { "timestamp": "...", "level": "INFO", "message": "..." }
        if (typeof msg.data === 'object' && msg.data !== null) {
             p.textContent = `[${msg.data.timestamp || new Date().toLocaleTimeString()}] [${msg.data.level || 'INFO'}] ${msg.data.message || JSON.stringify(msg.data)}`;
        } else {
             p.textContent = msg.data; // Raw log string
        }
        logOutput.appendChild(p);
        // Scroll to the bottom to see the latest log message
        logOutput.scrollTop = logOutput.scrollHeight;
    });

    socket.on('disconnect', function() {
        const p = document.createElement('p');
        p.textContent = '<em>Disconnected from log stream.</em>';
        logOutput.appendChild(p);
        logOutput.scrollTop = logOutput.scrollHeight;
        console.log('Socket.IO disconnected for logs.');
    });

    socket.on('connect_error', (err) => {
        logOutput.innerHTML = `<p><em>Connection Error: ${err.message}. Ensure server is running and accessible.</em></p>`;
        console.error('Socket.IO connection error:', err);
    });
});
</script>
{% endblock %}

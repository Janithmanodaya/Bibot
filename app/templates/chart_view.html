{% extends "base.html" %}
{% block title %}Chart View - Trading Bot{% endblock %}
{% block content %}
<h2>Chart View</h2>
<p>Real-time price charts with indicators and trading signals, adjustable by timeframe.</p>
<canvas id="priceChart"></canvas>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    const ctx = document.getElementById("priceChart") ? document.getElementById("priceChart").getContext("2d") : null;
    if (ctx) {
        new Chart(ctx, {
            type: "line",
            data: {
                labels: ["January", "February", "March", "April", "May", "June"],
                datasets: [{
                    label: "Sample Price Data",
                    data: [65, 59, 80, 81, 56, 55],
                    fill: false,
                    borderColor: "rgb(75, 192, 192)",
                    tension: 0.1
                }]
            },
            options: {}
        });
    }
});
</script>
{% endblock %}
